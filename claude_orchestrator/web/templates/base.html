<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI Telescreen{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      :root {
        --bg: #f6f2ea;
        --panel: rgba(255, 252, 247, 0.88);
        --text: #1d1d1a;
        --muted: #6b675e;
        --accent: #005f73;
        --accent-soft: #cde5e7;
        --danger: #b42318;
        --warn: #9a6700;
        --ok: #0f766e;
        --border: rgba(29, 29, 26, 0.12);
        --shadow: 0 20px 50px rgba(35, 30, 22, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        background:
          radial-gradient(circle at top right, rgba(0, 95, 115, 0.18), transparent 34%),
          radial-gradient(circle at bottom left, rgba(238, 155, 0, 0.18), transparent 28%),
          var(--bg);
        color: var(--text);
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: end;
        margin-bottom: 24px;
      }
      .title {
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 0.95;
        margin: 0;
      }
      .subtitle {
        color: var(--muted);
        max-width: 48rem;
        margin: 8px 0 0;
      }
      .panel {
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 20px;
      }
      .banner {
        margin-bottom: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--border);
      }
      .banner.notice {
        background: rgba(15, 118, 110, 0.08);
        color: var(--ok);
      }
      .banner.error {
        background: rgba(180, 35, 24, 0.08);
        color: var(--danger);
      }
      .grid {
        display: grid;
        gap: 18px;
      }
      .grid.columns {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.92rem;
        white-space: nowrap;
        background: rgba(0, 95, 115, 0.08);
      }
      .pill.small {
        padding: 4px 8px;
        font-size: 0.82rem;
      }
      .pill-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .status-pill {
        font-weight: 600;
      }
      .status-pill.status-queued {
        background: rgba(0, 95, 115, 0.12);
      }
      .status-pill.status-running,
      .status-pill.status-waiting_retry {
        background: rgba(154, 103, 0, 0.12);
      }
      .status-pill.status-completed {
        background: rgba(15, 118, 110, 0.12);
      }
      .status-pill.status-failed,
      .status-pill.status-cancelled {
        background: rgba(180, 35, 24, 0.12);
      }
      .status-queued { color: var(--accent); }
      .status-running { color: var(--warn); }
      .status-waiting_retry { color: var(--warn); }
      .status-completed { color: var(--ok); }
      .status-failed, .status-cancelled { color: var(--danger); }
      .table-wrap {
        width: 100%;
        overflow-x: auto;
      }
      .data-table {
        width: 100%;
        min-width: 980px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      th, td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 0.84rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      td .pill-row {
        gap: 6px;
      }
      .stack-compact {
        display: grid;
        gap: 4px;
        min-width: 0;
      }
      .stack-compact.tight {
        gap: 2px;
      }
      .mono-inline {
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.86rem;
      }
      .truncate-1,
      .truncate-2 {
        display: block;
        min-width: 0;
        overflow: hidden;
      }
      .truncate-1 {
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .truncate-2 {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
      }
      .path-chip {
        display: block;
        max-width: 100%;
        padding: 6px 8px;
        border-radius: 12px;
        background: rgba(29, 29, 26, 0.04);
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.84rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .value-block {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(29, 29, 26, 0.04);
      }
      .value-block.path {
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.86rem;
        overflow-wrap: anywhere;
      }
      .value-block code {
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
      .summary-grid {
        display: grid;
        gap: 10px;
      }
      .summary-grid > div {
        min-width: 0;
      }
      .summary-grid.two {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .cell-actions {
        width: 250px;
      }
      .cell-actions .toolbar {
        gap: 8px;
        align-items: flex-start;
      }
      .cell-actions form {
        margin: 0;
      }
      .disclosure {
        min-width: 0;
      }
      .disclosure > summary {
        list-style: none;
      }
      .disclosure > summary::-webkit-details-marker {
        display: none;
      }
      .disclosure-toggle {
        cursor: pointer;
        user-select: none;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: var(--accent);
        color: white;
        font: inherit;
        cursor: pointer;
      }
      select {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
        font: inherit;
      }
      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
        font: inherit;
      }
      textarea { min-height: 160px; resize: vertical; }
      button.secondary {
        background: rgba(0, 95, 115, 0.12);
        color: var(--accent);
      }
      button.danger {
        background: rgba(180, 35, 24, 0.14);
        color: var(--danger);
      }
      button.ghost {
        background: rgba(29, 29, 26, 0.06);
        color: var(--text);
      }
      code, pre {
        font-family: "SFMono-Regular", "Menlo", monospace;
        font-size: 0.88rem;
      }
      pre {
        white-space: pre-wrap;
        background: rgba(0, 0, 0, 0.04);
        border-radius: 14px;
        padding: 14px;
      }
      .meta {
        color: var(--muted);
        font-size: 0.92rem;
      }
      .meta-list {
        display: grid;
        gap: 4px;
      }
      .list-compact {
        margin: 8px 0 0 18px;
        padding: 0;
        display: grid;
        gap: 6px;
      }
      .form-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }
      .form-grid label span.meta,
      label > span.meta {
        display: block;
        margin-bottom: 4px;
      }
      .form-grid .full {
        grid-column: 1 / -1;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .toolbar.compact {
        gap: 8px;
        align-items: flex-start;
      }
      .toolbar.compact form {
        margin: 0;
      }
      .split {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        align-items: start;
        flex-wrap: wrap;
      }
      .section-summary {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      .activity-list {
        display: grid;
        gap: 10px;
      }
      .activity-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        flex-wrap: wrap;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }
      .activity-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .conversation-list {
        display: grid;
        gap: 10px;
      }
      .conversation-item {
        padding: 12px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(29, 29, 26, 0.03);
      }
      .conversation-item.operator {
        background: rgba(0, 95, 115, 0.06);
      }
      .conversation-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      details summary {
        cursor: pointer;
        color: var(--accent);
      }

      /* Chat-style workspace */
      .chat-thread {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chat-bubble {
        padding: 10px 14px;
        border-radius: 16px;
        max-width: 85%;
        font-size: 0.94rem;
        line-height: 1.45;
      }
      .chat-bubble.user {
        align-self: flex-end;
        background: rgba(0, 95, 115, 0.10);
        border-bottom-right-radius: 4px;
      }
      .chat-bubble.agent {
        align-self: flex-start;
        background: rgba(29, 29, 26, 0.05);
        border-bottom-left-radius: 4px;
      }
      .chat-bubble .chat-role {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 3px;
      }

      /* Workspace status bar */
      .ws-status-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 8px 0;
      }
      .ws-status-bar .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }
      .ws-status-bar .status-dot.active {
        background: var(--ok);
        box-shadow: 0 0 6px rgba(15, 118, 110, 0.4);
      }
      .ws-status-bar .status-dot.running {
        background: var(--warn);
        animation: pulse-dot 1.5s ease-in-out infinite;
      }
      .ws-status-bar .status-dot.blocked {
        background: var(--danger);
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* Action card for blocked states */
      .action-card {
        padding: 14px 16px;
        border-radius: 16px;
        border: 2px solid var(--warn);
        background: rgba(154, 103, 0, 0.05);
      }
      .action-card.urgent {
        border-color: var(--danger);
        background: rgba(180, 35, 24, 0.04);
      }
      .action-card h3 {
        margin: 0 0 6px 0;
        font-size: 1rem;
      }
      .action-card .action-steps {
        margin: 8px 0 0 18px;
        padding: 0;
        display: grid;
        gap: 4px;
        font-size: 0.92rem;
      }

      /* Approve / Reject buttons */
      .approve-btn {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: var(--ok);
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .reject-btn {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: rgba(180, 35, 24, 0.12);
        color: var(--danger);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      /* Compact summary card */
      .summary-card {
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(29, 29, 26, 0.03);
        border: 1px solid var(--border);
      }
      .summary-card .sc-label {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin-bottom: 4px;
      }

      /* Minimal composer */
      .composer-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .composer-row textarea {
        min-height: 56px;
        flex: 1;
        border-radius: 16px;
        resize: vertical;
      }
      .composer-row button {
        flex-shrink: 0;
        white-space: nowrap;
      }

      @media (max-width: 720px) {
        .shell { padding: 16px; }
        .header { display: block; }
        .chat-bubble { max-width: 95%; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      {% if request is defined and request.query_params.get("notice") %}
        <div class="banner notice">{{ request.query_params.get("notice") }}</div>
      {% endif %}
      {% if request is defined and request.query_params.get("error") %}
        <div class="banner error">{{ request.query_params.get("error") }}</div>
      {% endif %}
      {% block body %}{% endblock %}
    </div>
  </body>
</html>
